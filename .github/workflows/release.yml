name: Release

# Quick start packaging workflow for SQGI apps.
# It checks out https://github.com/supercamel/sqgi to build the runtime and
# sqgipkg, then packages this demo app for Linux and Windows.

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  APPIMAGE_EXTRACT_AND_RUN: '1'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout SqgiTemplate
        uses: actions/checkout@v4
        with:
          path: SqgiTemplate

      - name: Checkout sqgi
        uses: actions/checkout@v4
        with:
          repository: supercamel/sqgi
          ref: v0.1.6-alpha
          path: sqgi

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config git file ca-certificates wget \
            gobject-introspection \
            libglib2.0-dev libgirepository1.0-dev libffi-dev libcairo2-dev libgtk-4-dev \
            libgdk-pixbuf-2.0-dev \
            adwaita-icon-theme hicolor-icon-theme librsvg2-common shared-mime-info \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu qemu-user-static binfmt-support \
            mingw-w64 nsis squashfs-tools

      - name: Build and install sqgi
        run: |
          cmake -S sqgi -B sqgi/build -G Ninja -DCMAKE_BUILD_TYPE=Release -DSQ_ENABLE_JIT=ON
          cmake --build sqgi/build
          sudo cmake --install sqgi/build --prefix /usr/local
          sudo ldconfig

      - name: Build Linux x86_64 AppImage
        working-directory: SqgiTemplate
        run: sqgipkg --target appimage --appimage-arch x86_64 --sqgi-source-dir "$GITHUB_WORKSPACE/sqgi"

      - name: Build Linux aarch64 AppImage
        working-directory: SqgiTemplate
        run: sqgipkg --target appimage --appimage-arch aarch64 --sqgi-source-dir "$GITHUB_WORKSPACE/sqgi"

      - name: Build Windows installer
        working-directory: SqgiTemplate
        run: sqgipkg --target win-nsis --sqgi-source-dir "$GITHUB_WORKSPACE/sqgi"

      - name: Collect artifacts
        working-directory: SqgiTemplate
        run: |
          mkdir -p artifacts
          cp dist-linux-x86_64/SqgiTemplate.AppImage artifacts/SqgiTemplate-x86_64.AppImage
          cp dist-linux-aarch64/SqgiTemplate.AppImage artifacts/SqgiTemplate-aarch64.AppImage
          cp dist-windows-x86_64/SqgiTemplate-Setup.exe artifacts/SqgiTemplate-Setup.exe
          ls -lh artifacts

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sqgitemplate-builds
          path: SqgiTemplate/artifacts/*

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: SqgiTemplate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" artifacts/* \
            --repo "$GITHUB_REPOSITORY" --clobber
